name: Lichess Bot Runner

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  bot-runner:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Make engine executable
        run: chmod +x engines/stockfish
      - name: Inject token into config.yml
        env:
          LICHESS_TOKEN: ${{ secrets.LICHESS_TOKEN }}
        run: |
          if [ -z "$LICHESS_TOKEN" ]; then
            echo "ERROR: LICHESS_TOKEN secret is missing!"
            exit 1
          fi
          sed -i 's/^token:.*/token: "'"$LICHESS_TOKEN"'"/' config.yml
          echo "Token injected"
      - name: Run user_interface
        run: python user_interface.py
