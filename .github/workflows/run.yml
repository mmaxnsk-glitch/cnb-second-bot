name: Lichess Bot Runner

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  bot-runner:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Make engine executable
        run: chmod +x engines/stockfish
      - name: Run lichess-bot
        env:
          LICHESS_TOKEN: ${{ secrets.LICHESS_TOKEN }}
        run: python lichess-bot.py
