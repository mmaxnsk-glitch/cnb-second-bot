name: Lichess Bot Runner

concurrency:
  group: lichess-bot-runner
  cancel-in-progress: true

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Bot Mode'
        type: choice
        required: true
        options:
          - normal
          - matchmaking
          - tournament
      tournament_id:
        description: 'Tournament ID (if tournament mode)'
        type: string
        required: false
      team_id:
        description: 'Team ID (optional)'
        type: string
        required: false
      password:
        description: 'Tournament password (optional)'
        type: string
        required: false
  schedule:
    - cron: '0 */6 * * *'  # каждые 6 часов
  push:
    branches: [ main ]
    paths:
      - '**.py'
      - 'config.yml'

permissions:
  actions: write
  contents: write

jobs:
  bot-runner:
    runs-on: ubuntu-latest
    timeout-minutes: 355

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6      # обновлено до v6 (Node 24)
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install tenacity pyyaml

      - name: Setup Engines
        run: chmod +x engines/stockfish || true

      - name: Inject Lichess Bot Token
        env:
          LICHESS_TOKEN: ${{ secrets.LICHESS_TOKEN }}
        run: |
          python3 << 'EOF'
          import os, yaml
          token = os.environ.get("LICHESS_TOKEN")
          if not token:
              print("ERROR: LICHESS_TOKEN secret is missing!")
              exit(1)
          with open("config.yml", "r") as f:
              config = yaml.safe_load(f) or {}
          config["token"] = token
          with open("config.yml", "w") as f:
              yaml.dump(config, f, default_flow_style=False)
          print("Token injected successfully")
          EOF

      - name: Launch Bot
        env:
          MODE: ${{ github.event.inputs.mode }}
          TOUR_ID: ${{ github.event.inputs.tournament_id }}
          TEAM_ID: ${{ github.event.inputs.team_id }}
          PASSWORD: ${{ github.event.inputs.password }}
        run: |
          # Определяем команду запуска (используем lichess-bot.py)
          if [ -f "lichess-bot.py" ]; then
              BOT_SCRIPT="python3 lichess-bot.py"
          elif [ -f "user_interface.py" ]; then
              BOT_SCRIPT="python3 user_interface.py"
          else
              echo "ERROR: Neither lichess-bot.py nor user_interface.py found!"
              exit 1
          fi

          if [[ "$MODE" == "matchmaking" ]]; then
              echo "Starting bot in matchmaking mode"
              exec $BOT_SCRIPT
          elif [[ "$MODE" == "tournament" ]]; then
              if [[ -z "$TOUR_ID" ]]; then
                  echo "Tournament ID missing. Exiting."
                  exit 1
              fi
              echo "Joining tournament $TOUR_ID"
              exec $BOT_SCRIPT --tournament "$TOUR_ID" ${TEAM_ID:+--team "$TEAM_ID"} ${PASSWORD:+--password "$PASSWORD"}
          else
              echo "Starting bot in normal mode"
              exec $BOT_SCRIPT
          fi
